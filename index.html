<!DOCTYPE html>
<html lang="en-GB">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration Portal</title>
    
    </head>
<body>

    <main>
        <h1 id="title-head">Create Your Account</h1>
        <form>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" required placeholder="e.g Joe Bloggs"></input>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" required placeholder="joebloggs@blog.pi">
            </div>
    
            <div class="form-group">
                <label>Password</label>
                <input type="password" required minlength="8" placeholder="Minimum of 8 Characters">
            </div>
            <button id="create-account">Create Account</button>
            
        </form>

        </main>

</body>
</html>
